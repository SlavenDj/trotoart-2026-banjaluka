        :root {
            --bg-primary: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary: #4f46e5;
            --primary-light: #e0e7ff;
            --accent: #f59e0b;
            --border-color: #e2e8f0;
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            line-height: 1.5;
            padding-bottom: 80px;
        }

        /* Header Styling */
        header {
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            padding: 2.5rem 1.5rem;
            text-align: center;
        }

        .header-container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            background-color: var(--primary-light);
            color: var(--primary);
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -0.025em;
            margin-bottom: 0.5rem;
        }

        .header-sub {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Controls Section (Search & Filter Chips) */
        .controls-wrapper {
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            padding: 1.5rem 0;
            margin-bottom: 2.5rem;
            box-shadow: var(--shadow-sm);
        }

        .controls-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .search-row {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            align-items: center;
        }

        @media (min-width: 768px) {
            .search-row {
                grid-template-columns: 1fr auto;
            }
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            color: var(--text-muted);
            pointer-events: none;
            width: 18px;
            height: 18px;
        }

        .form-control {
            width: 100%;
            padding: 0.85rem 1rem 0.85rem 2.5rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background-color: var(--bg-primary);
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.95rem;
            transition: var(--transition);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
        }

        .btn-bookmark-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background-color: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 0.85rem 1.5rem;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
        }

        .btn-bookmark-toggle.active {
            background-color: var(--accent);
            border-color: var(--accent);
            color: #ffffff;
        }

        .btn-bookmark-toggle svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        /* Filter Chips Section */
        .filter-section {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .filter-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .chips-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .chip {
            background-color: var(--bg-primary);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            user-select: none;
        }

        .chip:hover {
            border-color: var(--primary);
            color: var(--primary);
            background-color: var(--primary-light);
        }

        .chip.active {
            background-color: var(--primary);
            border-color: var(--primary);
            color: #ffffff;
        }

        /* Main Content Grid */
        main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        /* Day Block */
        .day-section {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 1.75rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-sm);
        }

        .day-header {
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: baseline;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .day-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-main);
            text-transform: capitalize;
        }

        .day-subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Location Group */
        .location-group {
            margin-bottom: 1.5rem;
        }

        .location-group:last-child {
            margin-bottom: 0;
        }

        .location-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.025em;
        }

        .location-header svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        /* Event Row/Card list */
        .events-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            padding-left: 0.25rem;
        }

        .event-item {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 1rem;
            background-color: var(--bg-primary);
            border: 1px solid transparent;
            padding: 0.75rem 1rem;
            border-radius: var(--radius-md);
            transition: var(--transition);
        }

        .event-item:hover {
            border-color: var(--border-color);
            box-shadow: var(--shadow-sm);
            background-color: #ffffff;
        }

        .event-time {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-main);
            background-color: var(--border-color);
            padding: 0.25rem 0.5rem;
            border-radius: var(--radius-sm);
            min-width: 50px;
            text-align: center;
            white-space: nowrap;
        }

        .event-details {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .event-title {
            font-size: 0.95rem;
            color: var(--text-main);
            font-weight: 600;
        }

        .event-category-badge {
            align-self: flex-start;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.1rem 0.5rem;
            border-radius: 9999px;
            background-color: var(--border-color);
            color: var(--text-muted);
        }

        /* Category badge variants */
        .badge-music {
            background-color: #fee2e2;
            color: #991b1b;
        }

        .badge-performance {
            background-color: #fef3c7;
            color: #92400e;
        }

        .badge-workshop {
            background-color: #dcfce7;
            color: #166534;
        }

        .badge-other {
            background-color: #f1f5f9;
            color: #475569;
        }

        .btn-bookmark-star {
            background: none;
            border: none;
            color: #cbd5e1;
            cursor: pointer;
            padding: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: var(--transition);
        }

        .btn-bookmark-star:hover {
            background-color: var(--primary-light);
            color: var(--accent);
        }

        .btn-bookmark-star.bookmarked {
            color: var(--accent);
        }

        .btn-bookmark-star svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background-color: var(--bg-card);
            border: 1px dashed var(--border-color);
            border-radius: var(--radius-lg);
            color: var(--text-muted);
        }

        .empty-state svg {
            width: 48px;
            height: 48px;
            margin-bottom: 1rem;
            color: var(--text-muted);
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 0.25rem;
        }
    </style>
</head>

        // Bookmarks system inside LocalStorage
        let bookmarkedEvents = new Set(JSON.parse(localStorage.getItem('trotoart_bookmarks_v2')) || []);

        function saveBookmarks() {
            localStorage.setItem('trotoart_bookmarks_v2', JSON.stringify([...bookmarkedEvents]));
        }

        function getEventId(date, location, time, eventName) {
            return `${date}||${location}||${time}||${eventName}`;
        }

        // Categories Configuration & Auto-tagging rules
        const categoryMap = {
            'all': 'Све категорије',
            'музика': '🎵 Музика & Концерти',
            'перформанс': '🎭 Улични Перформанс & Плес',
            'радионица': '🎨 Дечији програм & Радионице',
            'остало': '✨ Остало'
        };

        function getEventCategory(eventName) {
            const txt = eventName.toLowerCase();
            if (txt.includes('концерт') || txt.includes('музик') || txt.includes('ансамбл') || txt.includes('хор') || txt.includes('оркестар') || txt.includes('бенд') || txt.includes('трио') || txt.includes('квартет') || txt.includes('терцет') || txt.includes('гитар') || txt.includes('бубњ') || txt.includes('виолин') || txt.includes('саксофон') || txt.includes('пева') || txt.includes('дуо')) {
                return 'музика';
            }
            if (txt.includes('представ') || txt.includes('плес') || txt.includes('перформанс') || txt.includes('кловн') || txt.includes('статуе') || txt.includes('пантомим') || txt.includes('акробат') || txt.includes('свил') || txt.includes('дефиле') || txt.includes('театар') || txt.includes('мађионичар') || txt.includes('маскота')) {
                return 'перформанс';
            }
            if (txt.includes('дјец') || txt.includes('дец') || txt.includes('радиониц') || txt.includes('цртањ') || txt.includes('сликањ') || txt.includes('бајк') || txt.includes('стрип') || txt.includes('школ') || txt.includes('рубик') || txt.includes('креартивци') || txt.includes('рукотворин')) {
                return 'радионица';
            }
            return 'остало';
        }

        let activeFilters = {
            search: '',
            date: 'all',
            location: 'all',
            category: 'all',
            onlyBookmarks: false
        };

        function initApp() {
            document.getElementById('festival-title').textContent = festivalData.festival_name;
            document.getElementById('city-badge').textContent = festivalData.location_city;

            populateFilterChips();
            renderSchedule();

            // Search event listener
            document.getElementById('search-input').addEventListener('input', (e) => {
                activeFilters.search = e.target.value.trim().toLowerCase();
                renderSchedule();
            });

            // Bookmark toggle
            document.getElementById('bookmark-filter-btn').addEventListener('click', (e) => {
                activeFilters.onlyBookmarks = !activeFilters.onlyBookmarks;
                const btn = e.currentTarget;
                if (activeFilters.onlyBookmarks) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
                renderSchedule();
            });
        }

        function populateFilterChips() {
            const datesContainer = document.getElementById('dates-chips');
            const locationsContainer = document.getElementById('locations-chips');
            const categoriesContainer = document.getElementById('categories-chips');

            const locationsSet = new Set();

            // 1. Setup Dates Chips
            festivalData.schedule.forEach(day => {
                const button = document.createElement('button');
                button.className = 'chip';
                button.dataset.value = day.date;
                button.textContent = `${day.day_of_week} (${formatDateStringShort(day.date)})`;
                button.addEventListener('click', () => handleChipClick('date', day.date, button, datesContainer));
                datesContainer.appendChild(button);

                // Collect locations dynamically
                Object.keys(day.locations).forEach(loc => locationsSet.add(loc));
            });

            // 2. Setup Locations Chips
            const sortedLocations = [...locationsSet].sort((a, b) => a.localeCompare(b, 'sr'));
            sortedLocations.forEach(loc => {
                const button = document.createElement('button');
                button.className = 'chip';
                button.dataset.value = loc;
                button.textContent = loc;
                button.addEventListener('click', () => handleChipClick('location', loc, button, locationsContainer));
                locationsContainer.appendChild(button);
            });

            // 3. Setup Categories Chips
            Object.entries(categoryMap).forEach(([key, label]) => {
                if (key === 'all') return; // Skip "all" because it's already coded in HTML
                const button = document.createElement('button');
                button.className = 'chip';
                button.dataset.value = key;
                button.textContent = label;
                button.addEventListener('click', () => handleChipClick('category', key, button, categoriesContainer));
                categoriesContainer.appendChild(button);
            });

            // Add Click handler for predefined static "all" chips
            document.querySelectorAll('.chip[data-value="all"]').forEach(chip => {
                chip.addEventListener('click', (e) => {
                    const parent = chip.parentElement;
                    const type = parent.id.replace('-chips', '').slice(0, -1); // returns "date", "location", or "category"
                    handleChipClick(type, 'all', chip, parent);
                });
            });
        }

        function handleChipClick(filterType, value, clickedChip, container) {
            // Update active state in UI
            container.querySelectorAll('.chip').forEach(chip => chip.classList.remove('active'));
            clickedChip.classList.add('active');

            // Save active filter
            activeFilters[filterType] = value;
            renderSchedule();
        }

        function renderSchedule() {
            const container = document.getElementById('schedule-container');
            container.innerHTML = '';
            let totalMatches = 0;

            festivalData.schedule.forEach(day => {
                // Filter by date
                if (activeFilters.date !== 'all' && activeFilters.date !== day.date) return;

                let dayHasMatches = false;
                const daySection = document.createElement('section');
                daySection.className = 'day-section';

                const dayHeader = document.createElement('div');
                dayHeader.className = 'day-header';
                dayHeader.innerHTML = `
                    <h2 class="day-title">${day.day_of_week.toLowerCase()}</h2>
                    <span class="day-subtitle">${formatDateStringFull(day.date)}</span>
                `;
                daySection.appendChild(dayHeader);

                // Process locations within the day
                Object.entries(day.locations).forEach(([locationName, events]) => {
                    // Filter by location
                    if (activeFilters.location !== 'all' && activeFilters.location !== locationName) return;
                    if (!events || events.length === 0) return;

                    // Filter events within location
                    const filteredEvents = events.filter(ev => {
                        const eventCategory = getEventCategory(ev.event);
                        
                        // Check category filter
                        if (activeFilters.category !== 'all' && activeFilters.category !== eventCategory) return false;

                        // Check search query (matches event details or location name)
                        const matchesSearch = !activeFilters.search || 
                            ev.event.toLowerCase().includes(activeFilters.search) || 
                            locationName.toLowerCase().includes(activeFilters.search);
                        
                        // Check bookmarked filter
                        const eventId = getEventId(day.date, locationName, ev.time, ev.event);
                        const matchesBookmark = !activeFilters.onlyBookmarks || bookmarkedEvents.has(eventId);

                        return matchesSearch && matchesBookmark;
                    });

                    if (filteredEvents.length > 0) {
                        dayHasMatches = true;
                        totalMatches += filteredEvents.length;

                        const locGroup = document.createElement('div');
                        locGroup.className = 'location-group';
                        
                        const locHeader = document.createElement('h3');
                        locHeader.className = 'location-header';
                        locHeader.innerHTML = `
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                            <span>${locationName}</span>
                        `;
                        locGroup.appendChild(locHeader);

                        const eventsList = document.createElement('div');
                        eventsList.className = 'events-list';

                        filteredEvents.forEach(ev => {
                            const eventId = getEventId(day.date, locationName, ev.time, ev.event);
                            const isBookmarked = bookmarkedEvents.has(eventId);
                            const category = getEventCategory(ev.event);

                            const eventItem = document.createElement('div');
                            eventItem.className = 'event-item';
                            eventItem.innerHTML = `
                                <div class="event-time">${ev.time}</div>
                                <div class="event-details">
                                    <div class="event-title">${ev.event}</div>
                                    <span class="event-category-badge badge-${category}">${categoryMap[category]}</span>
                                </div>
                                <button class="btn-bookmark-star ${isBookmarked ? 'bookmarked' : ''}" data-id="${eventId}" title="Означи догађај">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                        <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
                                    </svg>
                                </button>
                            `;

                            // Bookmarking logic
                            eventItem.querySelector('.btn-bookmark-star').addEventListener('click', (e) => {
                                const btn = e.currentTarget;
                                const id = btn.dataset.id;
                                if (bookmarkedEvents.has(id)) {
                                    bookmarkedEvents.delete(id);
                                    btn.classList.remove('bookmarked');
                                } else {
                                    bookmarkedEvents.add(id);
                                    btn.classList.add('bookmarked');
                                }
                                saveBookmarks();
                                
                                if (activeFilters.onlyBookmarks) {
                                    renderSchedule();
                                }
                            });

                            eventsList.appendChild(eventItem);
                        });

                        locGroup.appendChild(eventsList);
                        daySection.appendChild(locGroup);
                    }
                });

                if (dayHasMatches) {
                    container.appendChild(daySection);
                }
            });

            if (totalMatches === 0) {
                renderEmptyState(container);
            }
        }

        // Date String Formatting Helpers
        function formatDateStringShort(dateStr) {
            const dateParts = dateStr.split('-');
            return `${dateParts[2]}.${dateParts[1]}.`;
        }

        function formatDateStringFull(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('sr-RS', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        function renderEmptyState(target) {
            target.innerHTML = `
                <div class="empty-state">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <h3>Није пронађен ниједан догађај</h3>
                    <p>Пробајте да прилагодите филтере, категорије или претрагу.</p>
                </div>
            `;
        }

        // Launch app
        window.addEventListener('DOMContentLoaded', initApp);
    </script>
